<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PisaMusic 桌面歌词</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
        user-select: none;
      }

      body.locked #container {
        pointer-events: none;
      }

      body.locked .resize-zone {
        display: none;
      }

      body.locked #controller {
        display: none;
      }

      #container {
        width: 100vw;
        height: 100vh;
        margin-top: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        cursor: default;
      }

      #container.is-hover {
        cursor: move;
        background: rgba(0, 0, 0, 0.2);
      }

      #controller {
        position: absolute;
        top: 0px;
        left: 50%;
        display: none;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        color: #fff;
        background: rgba(15, 23, 42, 0.62);
        backdrop-filter: blur(10px);
        transform: translateX(-50%);
        z-index: 2;
      }

      #container.is-hover #controller {
        display: flex;
      }

      .btn {
        width: 32px;
        height: 32px;
        border: 0;
        border-radius: 50%;
        color: inherit;
        background: transparent;
        font-size: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      .btn:hover {
        background: rgba(255, 255, 255, 0.18);
      }

      #lyric-wrapper {
        width: min(92vw, 1200px);
        overflow: hidden;
        white-space: nowrap;
        text-align: center;
      }

      #lyric-text {
        display: inline-block;
        color: transparent;
        line-height: 1.2;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.28);
        background-clip: text;
        -webkit-background-clip: text;
        pointer-events: none;
      }

      .resize-zone {
        position: absolute;
        z-index: 3;
        display: none;
      }

      #container.is-hover .resize-zone {
        display: block;
      }

      .resize-right {
        right: 0;
        top: 12px;
        bottom: 12px;
        width: 8px;
        cursor: ew-resize;
      }

      .resize-bottom {
        bottom: 0;
        left: 12px;
        right: 12px;
        height: 8px;
        cursor: ns-resize;
      }

      .resize-left {
        left: 0;
        top: 12px;
        bottom: 12px;
        width: 8px;
        cursor: ew-resize;
      }

      .resize-top {
        top: 0;
        left: 12px;
        right: 12px;
        height: 8px;
        cursor: ns-resize;
      }

      .resize-corner-tr {
        right: 0;
        top: 0;
        width: 14px;
        height: 14px;
        cursor: nesw-resize;
      }

      .resize-corner-tl {
        left: 0;
        top: 0;
        width: 14px;
        height: 14px;
        cursor: nwse-resize;
      }

      .resize-corner-br {
        right: 0;
        bottom: 0;
        width: 14px;
        height: 14px;
        cursor: nwse-resize;
      }

      .resize-corner-bl {
        left: 0;
        bottom: 0;
        width: 14px;
        height: 14px;
        cursor: nesw-resize;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <div class="resize-zone resize-top"></div>
      <div class="resize-zone resize-right"></div>
      <div class="resize-zone resize-bottom"></div>
      <div class="resize-zone resize-left"></div>
      <div class="resize-zone resize-corner-tl"></div>
      <div class="resize-zone resize-corner-tr"></div>
      <div class="resize-zone resize-corner-br"></div>
      <div class="resize-zone resize-corner-bl"></div>
      <div id="controller">
        <button class="btn" id="size-down" title="减小字号"><span>A-</span></button>
        <button class="btn" id="size-up" title="增大字号"><span>A+</span></button>
        <button class="btn" id="prev-btn" title="上一首">
  <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><path fill="currentColor" d="M3 3.75a.75.75 0 0 1 1.5 0v16.5a.75.75 0 0 1-1.5 0zm18 1.003c0-1.408-1.578-2.24-2.74-1.444L7.763 10.503a1.75 1.75 0 0 0-.01 2.88l10.499 7.302c1.16.807 2.749-.024 2.749-1.437z"/></svg>
        </button>
        <button class="btn" id="play-btn" title="播放">

            <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 32 32">
	<path d="M0 0h32v32H0z" fill="none" />
	<path fill="currentColor" d="M11 23a1 1 0 0 1-1-1V10a1 1 0 0 1 1.447-.894l12 6a1 1 0 0 1 0 1.788l-12 6A1 1 0 0 1 11 23m1-11.382v8.764L20.764 16Z" />
	<path fill="currentColor" d="M16 4A12 12 0 1 1 4 16A12 12 0 0 1 16 4m0-2a14 14 0 1 0 14 14A14 14 0 0 0 16 2" />
</svg>

</svg>

        </button>
        <button class="btn" id="pause-btn" title="暂停">
          <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 32 32">
	<path d="M0 0h32v32H0z" fill="none" />
	<path fill="currentColor" d="M14 10h-2v12h2zm6 0h-2v12h2z" />
	<path fill="currentColor" d="M16 4A12 12 0 1 1 4 16A12 12 0 0 1 16 4m0-2a14 14 0 1 0 14 14A14 14 0 0 0 16 2" />
</svg>

        </button>
        <button class="btn" id="next-btn" title="下一首">
  <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><path fill="currentColor" d="M3 4.753c0-1.408 1.578-2.24 2.74-1.444l10.498 7.194a1.75 1.75 0 0 1 .01 2.88L5.749 20.685C4.59 21.492 3 20.66 3 19.248zM21 3.75a.75.75 0 0 0-1.5 0v16.5a.75.75 0 0 0 1.5 0z"/></svg>
        </button>
        <button class="btn" id="lock-btn" title="锁定"></button>
        <button class="btn" id="close-btn" title="关闭">
          <svg t="1740289582268" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg"
        p-id="1161" width="48" height="48">
        <path d="M810 274l-238 238 238 238-60 60-238-238-238 238-60-60 238-238-238-238 60-60 238 238 238-238z"
            p-id="1162" fill="currentColor"></path>
    </svg>
        </button>
      </div>
      <div id="lyric-wrapper">
        <div id="lyric-text">暂无歌词</div>
      </div>
    </div>

    <script>
      const { ipcRenderer } = require("electron");

      const emptyLine = {
        startTime: 0,
        words: [{ word: "暂无歌词", startTime: 0, endTime: 3000 }],
        endTime: 500000,
      };

      const state = {
        lyrics: [emptyLine],
        isPlaying: false,
        baseTime: 0,
        baseReceivedAt: 0,
        rafId: null,
        locked: false,
        style: {
          width: 800,
          height: 120,
          overlayTaskbar: false,
          autoFontSize: true,
          maxSize: 64,
          minSize: 10,
          fontSize: 28,
          fontFamily: "Microsoft YaHei",
          textColor: "#fff",
          highlightColor: "#1871FD",
          fontWeight: 600,
        },
      };

      const container = document.getElementById("container");
      const lyricTextEl = document.getElementById("lyric-text");
      const wrapperEl = document.getElementById("lyric-wrapper");
      const playBtn = document.getElementById("play-btn");
      const pauseBtn = document.getElementById("pause-btn");
      const lockBtn = document.getElementById("lock-btn");
      const lockIcon = '<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="10" x="5" y="11" rx="2"></rect><path d="M8 11V7a4 4 0 0 1 8 0v4"></path></svg>';
      const unlockIcon = '<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="10" x="5" y="11" rx="2"></rect><path d="M8 11V7a4 4 0 0 1 7.5-2"></path></svg>';

      function calcAutoFontSize() {
        const h = window.innerHeight;
        const size = Math.round(h * 0.35);
        return Math.max(state.style.minSize, Math.min(state.style.maxSize, size));
      }

      function getEffectiveFontSize() {
        if (state.style.autoFontSize) return calcAutoFontSize();
        return state.style.fontSize;
      }

      function applyFontSize() {
        lyricTextEl.style.fontSize = `${getEffectiveFontSize()}px`;
      }

      function applySnapshot(snapshot) {
        if (!snapshot) return;
        setStyle(snapshot.style);
        setLyrics(snapshot.lyrics);
        setLocked(Boolean(snapshot.locked));
        updateTime(snapshot.currentTime || 0);
        snapshot.isPlaying ? play() : pause();
      }

      function setLyrics(payload) {
        const lines = Array.isArray(payload?.lines) ? payload.lines : [];
        state.lyrics = lines.length
          ? lines
              .filter((line) => line && Array.isArray(line.words))
              .sort((a, b) => a.startTime - b.startTime)
          : [emptyLine];
        renderWithTime(state.baseTime);
      }

      function setStyle(style) {
        if (!style || typeof style !== "object") return;
        state.style = { ...state.style, ...style };
        lyricTextEl.style.fontFamily = state.style.fontFamily;
        lyricTextEl.style.fontWeight = state.style.fontWeight;
        applyFontSize();
        renderWithTime(state.baseTime);
      }

      function setLocked(locked) {
        state.locked = locked;
        document.body.classList.toggle("locked", locked);
        lockBtn.innerHTML = locked ? unlockIcon : lockIcon;
        lockBtn.title = locked ? "解锁" : "锁定";
        if (locked) container.classList.remove("is-hover");
      }

      function updateTime(time) {
        state.baseTime = Number.isFinite(time) ? time : 0;
        state.baseReceivedAt = performance.now();
        if (state.isPlaying && state.rafId === null) {
          state.rafId = requestAnimationFrame(animate);
        }
        if (!state.isPlaying) renderWithTime(state.baseTime);
      }

      function play() {
        state.isPlaying = true;
        playBtn.style.display = "none";
        pauseBtn.style.display = "inline-block";
        if (state.rafId === null) {
          state.rafId = requestAnimationFrame(animate);
        }
      }

      function pause() {
        state.isPlaying = false;
        pauseBtn.style.display = "none";
        playBtn.style.display = "inline-block";
        if (state.rafId !== null) {
          cancelAnimationFrame(state.rafId);
          state.rafId = null;
        }
        renderWithTime(state.baseTime);
      }

      function animate() {
        if (!state.isPlaying) {
          state.rafId = null;
          return;
        }
        const displayTime = state.baseTime + performance.now() - state.baseReceivedAt;
        renderWithTime(displayTime);
        state.rafId = requestAnimationFrame(animate);
      }

      function getCurrentLine(time) {
        for (let i = state.lyrics.length - 1; i >= 0; i -= 1) {
          if (time >= state.lyrics[i].startTime) return state.lyrics[i];
        }
        return state.lyrics[0] || emptyLine;
      }

      function buildCharTimeline(line) {
        if (!line || !Array.isArray(line.words)) return [];
        const chars = [];
        line.words.forEach((word) => {
          const text = String(word.word || "");
          const len = Math.max(text.length, 1);
          const startTime = Number(word.startTime || line.startTime || 0);
          const endTime = Number(word.endTime || line.endTime || startTime + 3000);
          const duration = Math.max(endTime - startTime, 1);
          for (let i = 0; i < text.length; i += 1) {
            chars.push({
              char: text[i],
              start: startTime + (duration / len) * i,
              end: startTime + (duration / len) * (i + 1),
            });
          }
        });
        return chars;
      }

      function renderWithTime(displayTime) {
        const chars = buildCharTimeline(getCurrentLine(displayTime));
        if (!chars.length) {
          lyricTextEl.textContent = "暂无歌词";
          lyricTextEl.style.backgroundImage = `linear-gradient(to right, ${state.style.textColor}, ${state.style.textColor})`;
          wrapperEl.scrollLeft = 0;
          return;
        }

        const fullText = chars.map((c) => c.char).join("");
        lyricTextEl.textContent = fullText;

        const totalWidth = getTextWidth(fullText);
        let highlightWidth = 0;
        for (const item of chars) {
          if (displayTime >= item.end) {
            highlightWidth += getTextWidth(item.char);
          } else if (displayTime >= item.start) {
            const progress = (displayTime - item.start) / Math.max(item.end - item.start, 1);
            highlightWidth += getTextWidth(item.char) * Math.max(0, Math.min(1, progress));
            break;
          } else {
            break;
          }
        }

        const percent = totalWidth > 0 ? Math.min(100, (highlightWidth / totalWidth) * 100) : 0;
        lyricTextEl.style.backgroundImage = `linear-gradient(to right, ${state.style.highlightColor} ${percent}%, ${state.style.textColor} ${percent}%)`;
        wrapperEl.scrollLeft = totalWidth > wrapperEl.clientWidth
          ? Math.max(0, highlightWidth - wrapperEl.clientWidth / 2)
          : 0;
      }

      function getTextWidth(text) {
        const span = document.createElement("span");
        span.textContent = text;
        span.style.fontSize = `${getEffectiveFontSize()}px`;
        span.style.fontFamily = state.style.fontFamily;
        span.style.fontWeight = state.style.fontWeight;
        span.style.position = "absolute";
        span.style.visibility = "hidden";
        document.body.appendChild(span);
        const width = span.offsetWidth;
        document.body.removeChild(span);
        return width;
      }

      function sendControl(action) {
        ipcRenderer.send("desktop-lyric:control", action);
      }

      document.getElementById("prev-btn").addEventListener("click", () => sendControl("prev"));
      document.getElementById("next-btn").addEventListener("click", () => sendControl("next"));
      playBtn.addEventListener("click", () => sendControl("play"));
      pauseBtn.addEventListener("click", () => sendControl("pause"));
      document.getElementById("close-btn").addEventListener("click", () => sendControl("close"));
      document.getElementById("lock-btn").addEventListener("click", () => {
        ipcRenderer.send("desktop-lyric:set-locked", !state.locked);
      });
      document.getElementById("size-up").addEventListener("click", () => changeFontSize(1));
      document.getElementById("size-down").addEventListener("click", () => changeFontSize(-1));

      function changeFontSize(step) {
        const nextSize = Math.max(
          state.style.minSize,
          Math.min(state.style.maxSize, getEffectiveFontSize() + step)
        );
        state.style.autoFontSize = false;
        state.style.fontSize = nextSize;
        applyFontSize();
        ipcRenderer.send("desktop-lyric:set-style", { ...state.style, autoFontSize: false, fontSize: nextSize });
      }

      container.addEventListener("mouseenter", () => {
        if (!state.locked) container.classList.add("is-hover");
      });
      container.addEventListener("mouseleave", () => container.classList.remove("is-hover"));

      // --- Drag ---
      let drag = null;
      container.addEventListener("mousedown", async (event) => {
        if (state.locked || event.target.closest("#controller") || event.target.closest(".resize-zone")) return;
        const bounds = await ipcRenderer.invoke("desktop-lyric:get-bounds");
        if (!bounds) return;
        drag = {
          startX: event.screenX,
          startY: event.screenY,
          x: bounds.x,
          y: bounds.y,
          width: bounds.width,
          height: bounds.height,
        };
      });
      document.addEventListener("mouseup", () => {
        drag = null;
        resizeState = null;
      });
      document.addEventListener("mousemove", async (event) => {
        if (resizeState) {
          handleResizeMove(event);
          return;
        }
        if (!drag) return;
        const screenSize = await ipcRenderer.invoke("desktop-lyric:get-screen-size");
        const x = Math.max(0, Math.min(screenSize.width - drag.width, drag.x + event.screenX - drag.startX));
        const y = Math.max(0, Math.min(screenSize.height - drag.height, drag.y + event.screenY - drag.startY));
        ipcRenderer.send("desktop-lyric:move", x, y, drag.width, drag.height);
      });

      // --- Resize ---
      let resizeState = null;
      const RESIZE_MIN_WIDTH = 500;
      const RESIZE_MIN_HEIGHT = 60;
      const RESIZE_MAX_WIDTH = 1600;
      const RESIZE_MAX_HEIGHT = 200;

      document.querySelectorAll(".resize-zone").forEach((zone) => {
        zone.addEventListener("mousedown", async (event) => {
          if (state.locked) return;
          event.preventDefault();
          event.stopPropagation();
          const bounds = await ipcRenderer.invoke("desktop-lyric:get-bounds");
          if (!bounds) return;
          const direction = [];
          if (zone.classList.contains("resize-right") || zone.classList.contains("resize-corner-br") || zone.classList.contains("resize-corner-tr")) direction.push("r");
          if (zone.classList.contains("resize-bottom") || zone.classList.contains("resize-corner-br") || zone.classList.contains("resize-corner-bl")) direction.push("b");
          if (zone.classList.contains("resize-left") || zone.classList.contains("resize-corner-bl") || zone.classList.contains("resize-corner-tl")) direction.push("l");
          if (zone.classList.contains("resize-top") || zone.classList.contains("resize-corner-tr") || zone.classList.contains("resize-corner-tl")) direction.push("t");
          resizeState = {
            startX: event.screenX,
            startY: event.screenY,
            x: bounds.x,
            y: bounds.y,
            width: bounds.width,
            height: bounds.height,
            direction,
          };
        });
      });

      function handleResizeMove(event) {
        if (!resizeState) return;
        const dx = event.screenX - resizeState.startX;
        const dy = event.screenY - resizeState.startY;

        let newX = resizeState.x;
        let newY = resizeState.y;
        let newW = resizeState.width;
        let newH = resizeState.height;

        if (resizeState.direction.includes("r")) {
          newW = Math.max(RESIZE_MIN_WIDTH, Math.min(RESIZE_MAX_WIDTH, resizeState.width + dx));
        }
        if (resizeState.direction.includes("l")) {
          const wDelta = Math.min(resizeState.width - RESIZE_MIN_WIDTH, Math.max(dx, -(RESIZE_MAX_WIDTH - resizeState.width)));
          newW = resizeState.width - wDelta;
          newX = resizeState.x + wDelta;
        }
        if (resizeState.direction.includes("b")) {
          newH = Math.max(RESIZE_MIN_HEIGHT, Math.min(RESIZE_MAX_HEIGHT, resizeState.height + dy));
        }
        if (resizeState.direction.includes("t")) {
          const hDelta = Math.min(resizeState.height - RESIZE_MIN_HEIGHT, Math.max(dy, -(RESIZE_MAX_HEIGHT - resizeState.height)));
          newH = resizeState.height - hDelta;
          newY = resizeState.y + hDelta;
        }

        ipcRenderer.send("desktop-lyric:move", newX, newY, newW, newH);
      }

      ipcRenderer.on("desktop-lyric:snapshot", (_event, snapshot) => applySnapshot(snapshot));
      ipcRenderer.on("desktop-lyric:set-lyrics", (_event, lyrics) => setLyrics(lyrics));
      ipcRenderer.on("desktop-lyric:update-time", (_event, time) => updateTime(time));
      ipcRenderer.on("desktop-lyric:set-style", (_event, style) => setStyle(style));
      ipcRenderer.on("desktop-lyric:set-locked", (_event, locked) => setLocked(locked));
      ipcRenderer.on("desktop-lyric:play", play);
      ipcRenderer.on("desktop-lyric:pause", pause);

      setStyle(state.style);
      setLocked(state.locked);
      pause();
      ipcRenderer.send("desktop-lyric:ready");
    </script>
  </body>
</html>
