<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>意见反馈 - pisamusic</title>
    <script>
        (function () {
            try {
                var p = new URLSearchParams(location.search);
                if (p.get('theme') === 'dark') document.documentElement.classList.add('dark');
            } catch (_) {}
        })();
    </script>
    <script src="file:///android_asset/shared/tailwind.js"></script>
    <script src="file:///android_asset/shared/tailwind-base.js"></script>
    <script>
        tailwind.config.darkMode = 'class';
        Object.assign(tailwind.config.theme.extend, {
            colors: {
                sky: { 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7' }
            }
        });
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }
        input[type="radio"] { appearance: none; -webkit-appearance: none; }
        html, body { background-color: #fefefe; }
        @media (prefers-color-scheme: dark) {
            html:not(.light) body, html.dark body { background-color: #17191d; }
        }
        html.dark body { background-color: #17191d; }
    </style>
</head>
<body class="bg-[#fefefe] dark:bg-[#17191d] antialiased text-slate-800 dark:text-slate-200 flex flex-col min-h-screen m-0">

    <div class="relative flex-1 w-full max-w-md mx-auto bg-[#fefefe] dark:bg-[#17191d] overflow-hidden flex flex-col min-h-screen">
        <main class="flex-1 overflow-y-auto no-scrollbar pt-4 pb-12 px-6">
            <form id="feedback-form" class="flex flex-col animate-fade-in-up">

                <div class="mb-6">
                    <label class="block text-[15px] font-bold text-slate-800 dark:text-white mb-3">反馈类型 <span class="text-red-500 ml-1">*</span></label>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="cursor-pointer relative">
                            <input type="radio" name="feedback_type" value="bug" class="peer sr-only" checked>
                            <div class="rounded-xl border border-gray-200 dark:border-slate-800 bg-white dark:bg-slate-900 py-3 px-4 text-center text-[14px] text-slate-600 dark:text-slate-400 font-medium transition-all peer-checked:border-sky-500 peer-checked:bg-sky-50 dark:peer-checked:bg-sky-500/10 peer-checked:text-sky-600 dark:peer-checked:text-sky-400 flex items-center justify-center shadow-sm">
                                <svg class="w-4 h-4 mr-1.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                                异常/报错
                            </div>
                        </label>
                        <label class="cursor-pointer relative">
                            <input type="radio" name="feedback_type" value="suggestion" class="peer sr-only">
                            <div class="rounded-xl border border-gray-200 dark:border-slate-800 bg-white dark:bg-slate-900 py-3 px-4 text-center text-[14px] text-slate-600 dark:text-slate-400 font-medium transition-all peer-checked:border-sky-500 peer-checked:bg-sky-50 dark:peer-checked:bg-sky-500/10 peer-checked:text-sky-600 dark:peer-checked:text-sky-400 flex items-center justify-center shadow-sm">
                                <svg class="w-4 h-4 mr-1.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
                                </svg>
                                功能建议
                            </div>
                        </label>
                        <label class="cursor-pointer relative">
                            <input type="radio" name="feedback_type" value="account" class="peer sr-only">
                            <div class="rounded-xl border border-gray-200 dark:border-slate-800 bg-white dark:bg-slate-900 py-3 px-4 text-center text-[14px] text-slate-600 dark:text-slate-400 font-medium transition-all peer-checked:border-sky-500 peer-checked:bg-sky-50 dark:peer-checked:bg-sky-500/10 peer-checked:text-sky-600 dark:peer-checked:text-sky-400 flex items-center justify-center shadow-sm">
                                <svg class="w-4 h-4 mr-1.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                </svg>
                                账号相关
                            </div>
                        </label>
                        <label class="cursor-pointer relative">
                            <input type="radio" name="feedback_type" value="other" class="peer sr-only">
                            <div class="rounded-xl border border-gray-200 dark:border-slate-800 bg-white dark:bg-slate-900 py-3 px-4 text-center text-[14px] text-slate-600 dark:text-slate-400 font-medium transition-all peer-checked:border-sky-500 peer-checked:bg-sky-50 dark:peer-checked:bg-sky-500/10 peer-checked:text-sky-600 dark:peer-checked:text-sky-400 flex items-center justify-center shadow-sm">
                                <svg class="w-4 h-4 mr-1.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h.01M12 12h.01M19 12h.01M6 12a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0z" />
                                </svg>
                                其他问题
                            </div>
                        </label>
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block text-[15px] font-bold text-slate-800 dark:text-white mb-3">问题描述 <span class="text-red-500 ml-1">*</span></label>
                    <div class="relative">
                        <textarea id="feedback-desc" rows="5" maxlength="500"
                            class="w-full rounded-2xl border border-gray-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-4 pr-16 text-[14px] text-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-shadow resize-none shadow-sm"
                            placeholder="请详细描述您遇到的问题或建议，我们将尽快为您处理..."
                            required></textarea>
                        <div class="absolute bottom-3 right-4 text-xs text-slate-400">
                            <span id="char-count">0</span> / 500
                        </div>
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block text-[15px] font-bold text-slate-800 dark:text-white mb-3">添加图片 <span class="text-xs font-normal text-slate-400 ml-2">(选填，最多 3 张)</span></label>
                    <input type="file" id="feedback-images" accept="image/jpeg,image/png,image/webp" multiple class="sr-only" tabindex="-1" aria-hidden="true">
                    <div id="image-previews" class="flex flex-wrap gap-3 mb-3"></div>
                    <button type="button" id="pick-images-btn" class="w-20 h-20 rounded-2xl border-2 border-dashed border-gray-300 dark:border-slate-700 bg-gray-50 dark:bg-slate-900 flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:border-sky-400 hover:text-sky-500 transition-colors">
                        <svg class="w-6 h-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                        <span class="text-[10px] font-medium">上传</span>
                    </button>
                </div>

                <div class="mb-8">
                    <label for="feedback-contact" class="block text-[15px] font-bold text-slate-800 dark:text-white mb-3">联系方式 <span class="text-xs font-normal text-slate-400 ml-2">(选填)</span></label>
                    <input id="feedback-contact" type="text"
                        class="w-full rounded-xl border border-gray-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-4 py-3.5 text-[14px] text-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-shadow shadow-sm"
                        placeholder="请输入手机号或邮箱" autocomplete="off">
                </div>

                <div class="w-full mt-4 pb-4">
                    <button id="submit-btn" type="submit" class="relative w-full py-3.5 rounded-2xl bg-sky-500 text-white font-semibold text-[15px] shadow-lg shadow-sky-500/30 hover:bg-sky-600 transition-all active:scale-95 flex items-center justify-center overflow-hidden disabled:opacity-70 disabled:cursor-not-allowed border-0">
                        <span id="submit-text" class="transition-opacity duration-300">提交反馈</span>
                        <div id="submit-spinner" class="absolute inset-0 flex items-center justify-center opacity-0 transition-opacity duration-300 pointer-events-none">
                            <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                        </div>
                    </button>
                    <p class="text-center text-[11px] text-slate-400 mt-4">感谢您的反馈，我们将认真评估每一条建议。</p>
                </div>
            </form>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var textarea = document.getElementById('feedback-desc');
            var charCount = document.getElementById('char-count');
            var fileInput = document.getElementById('feedback-images');
            var pickBtn = document.getElementById('pick-images-btn');
            var previews = document.getElementById('image-previews');
            var form = document.getElementById('feedback-form');
            var submitBtn = document.getElementById('submit-btn');
            var submitText = document.getElementById('submit-text');
            var submitSpinner = document.getElementById('submit-spinner');
            var contactInput = document.getElementById('feedback-contact');

            function setSubmitLoading(loading) {
                if (!submitBtn || !submitText || !submitSpinner) return;
                submitBtn.disabled = loading;
                if (loading) {
                    submitText.classList.add('opacity-0');
                    submitSpinner.classList.remove('opacity-0');
                    submitSpinner.classList.add('opacity-100');
                } else {
                    submitSpinner.classList.remove('opacity-100');
                    submitSpinner.classList.add('opacity-0');
                    submitText.classList.remove('opacity-0');
                }
            }

            function syncFilesToInput(files) {
                var dt = new DataTransfer();
                for (var i = 0; i < Math.min(files.length, 3); i++) {
                    dt.items.add(files[i]);
                }
                fileInput.files = dt.files;
                renderPreviews();
            }

            function renderPreviews() {
                previews.innerHTML = '';
                var files = fileInput.files;
                for (var i = 0; i < files.length; i++) {
                    (function (idx) {
                        var wrap = document.createElement('div');
                        wrap.className = 'relative w-20 h-20 rounded-2xl overflow-hidden border border-gray-200 dark:border-slate-700 shrink-0';
                        var img = document.createElement('img');
                        img.className = 'w-full h-full object-cover';
                        img.src = URL.createObjectURL(files[idx]);
                        var rm = document.createElement('button');
                        rm.type = 'button';
                        rm.className = 'absolute top-0.5 right-0.5 w-5 h-5 rounded-full bg-black/50 text-white text-xs flex items-center justify-center';
                        rm.textContent = '×';
                        rm.onclick = function () {
                            var dt = new DataTransfer();
                            for (var j = 0; j < files.length; j++) {
                                if (j !== idx) dt.items.add(files[j]);
                            }
                            fileInput.files = dt.files;
                            renderPreviews();
                        };
                        wrap.appendChild(img);
                        wrap.appendChild(rm);
                        previews.appendChild(wrap);
                    })(i);
                }
            }

            textarea.addEventListener('input', function () {
                var len = textarea.value.length;
                if (len > 500) {
                    textarea.value = textarea.value.substring(0, 500);
                    len = 500;
                }
                charCount.innerText = String(len);
            });

            pickBtn.addEventListener('click', function () {
                fileInput.click();
            });

            fileInput.addEventListener('change', function () {
                var arr = Array.prototype.slice.call(fileInput.files, 0);
                if (arr.length > 3) {
                    arr = arr.slice(0, 3);
                }
                syncFilesToInput(arr);
            });

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                if (!window.AndroidFeedbackHost) {
                    alert('环境异常');
                    return;
                }
                var desc = textarea.value.trim();
                if (!desc) {
                    alert('请填写问题描述');
                    textarea.focus();
                    return;
                }
                var typeInput = form.querySelector('input[name="feedback_type"]:checked');
                var type = typeInput ? typeInput.value : 'other';

                var fd = new FormData();
                fd.append('feedback_type', type);
                fd.append('description', desc);
                fd.append('contact', (contactInput.value || '').trim());
                fd.append('device', AndroidFeedbackHost.getDeviceMeta());

                var imgs = fileInput.files;
                for (var k = 0; k < imgs.length; k++) {
                    fd.append('images', imgs[k]);
                }

                var url = AndroidFeedbackHost.getFeedbackApiUrl();
                setSubmitLoading(true);

                fetch(url, { method: 'POST', body: fd })
                    .then(function (r) { return r.json(); })
                    .then(function (json) {
                        setSubmitLoading(false);
                        if (json && json.success) {
                            AndroidFeedbackHost.onSubmitResult(true, json.msg || '');
                        } else {
                            AndroidFeedbackHost.onSubmitResult(false, (json && json.msg) ? json.msg : '提交失败');
                        }
                    })
                    .catch(function () {
                        setSubmitLoading(false);
                        AndroidFeedbackHost.onSubmitResult(false, '网络错误');
                    });
            });
        });
    </script>
</body>
</html>
