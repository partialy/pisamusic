<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>加载失败 - pisamusic</title>
    <script src="file:///android_asset/shared/tailwind.js"></script>
    <script src="file:///android_asset/shared/tailwind-base.js"></script>
    <script>
        Object.assign(tailwind.config.theme.extend, {
            colors: {
                sky: { 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7' }
            }
        });
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }
        html, body { background-color: #fefefe; }
        @media (prefers-color-scheme: dark) {
            html, body { background-color: #17191d; }
        }
    </style>
</head>
<body class="bg-[#fefefe] dark:bg-[#17191d] transition-colors duration-500 antialiased text-slate-800 dark:text-slate-200 flex flex-col min-h-screen m-0">

    <div class="relative flex-1 w-full max-w-md mx-auto bg-[#fefefe] dark:bg-[#17191d] overflow-hidden flex flex-col transition-colors duration-500 min-h-screen">

        <main class="flex-1 overflow-y-auto no-scrollbar pt-[20px] pb-12 px-6 flex flex-col">

            <div class="flex-1 flex flex-col items-center justify-center">
                <div class="animate-fade-in-up flex flex-col items-center w-full">
                    <div class="w-24 h-24 bg-red-50 dark:bg-red-500/10 rounded-full flex items-center justify-center mb-6 relative">
                        <svg class="w-12 h-12 text-red-500 dark:text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                        </svg>
                        <div class="absolute top-2 right-2 w-3 h-3 bg-red-400 rounded-full border-2 border-[#fefefe] dark:border-[#17191d]"></div>
                    </div>

                    <h2 class="text-2xl font-bold tracking-tight text-slate-800 dark:text-white mb-2 text-center">
                        哎呀，内容走丢了
                    </h2>
                    <p class="text-[14px] text-slate-500 dark:text-slate-400 text-center mb-8 px-4 leading-relaxed">
                        抱歉，我们在获取数据时遇到了未知问题，请检查网络或稍后再试。
                    </p>
                </div>

                <div class="w-full bg-white dark:bg-slate-900 rounded-2xl p-5 shadow-sm border border-gray-100 dark:border-slate-800 animate-fade-in-up" style="animation-delay: 0.1s;">
                    <h3 class="text-[15px] font-bold text-slate-800 dark:text-white mb-4 flex items-center">
                        <span class="text-xl mr-2">💡</span> 常见解决方法
                    </h3>

                    <ul class="space-y-4">
                        <li class="flex items-start">
                            <div class="flex-shrink-0 w-6 h-6 rounded-full bg-sky-50 dark:bg-sky-500/10 flex items-center justify-center text-sky-500 mr-3 mt-0.5">
                                <span class="text-xs font-bold">1</span>
                            </div>
                            <div>
                                <p class="text-[14px] font-medium text-slate-700 dark:text-slate-200">检查网络设置</p>
                                <p class="text-xs text-slate-400 mt-0.5">请确保您的设备已连接到可用的 Wi-Fi 或移动网络</p>
                            </div>
                        </li>
                        <li class="flex items-start">
                            <div class="flex-shrink-0 w-6 h-6 rounded-full bg-sky-50 dark:bg-sky-500/10 flex items-center justify-center text-sky-500 mr-3 mt-0.5">
                                <span class="text-xs font-bold">2</span>
                            </div>
                            <div>
                                <p class="text-[14px] font-medium text-slate-700 dark:text-slate-200">切换网络环境</p>
                                <p class="text-xs text-slate-400 mt-0.5">尝试在 Wi-Fi 和 4G/5G 网络之间进行切换</p>
                            </div>
                        </li>
                        <li class="flex items-start">
                            <div class="flex-shrink-0 w-6 h-6 rounded-full bg-sky-50 dark:bg-sky-500/10 flex items-center justify-center text-sky-500 mr-3 mt-0.5">
                                <span class="text-xs font-bold">3</span>
                            </div>
                            <div>
                                <p class="text-[14px] font-medium text-slate-700 dark:text-slate-200">重启应用</p>
                                <p class="text-xs text-slate-400 mt-0.5">清理后台运行的 App 并重新打开</p>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>

            <div class="w-full mt-8 animate-fade-in-up" style="animation-delay: 0.2s;">
                <button id="retry-btn" type="button" class="relative w-full py-3.5 rounded-2xl bg-sky-500 text-white font-semibold text-[15px] shadow-lg shadow-sky-500/30 hover:bg-sky-600 transition-all active:scale-95 mb-3 flex items-center justify-center overflow-hidden border-0 cursor-pointer">
                    <span id="retry-text" class="transition-opacity duration-300">重新尝试</span>
                    <div id="retry-spinner" class="absolute inset-0 flex items-center justify-center opacity-0 transition-opacity duration-300 pointer-events-none">
                        <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </div>
                </button>

                <button id="feedback-btn" type="button" class="w-full py-3.5 rounded-2xl bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-800 text-slate-600 dark:text-slate-300 font-semibold text-[15px] hover:bg-gray-50 dark:hover:bg-slate-800 transition-colors active:scale-95 flex items-center justify-center cursor-pointer">
                    <svg class="w-4 h-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                    </svg>
                    反馈问题
                </button>

                <p class="text-center text-[10px] text-slate-400 mt-5 font-mono tracking-wider">
                    Error Code: ERR_LOAD_GENERIC
                </p>
            </div>

        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var retryBtn = document.getElementById('retry-btn');
            var retryText = document.getElementById('retry-text');
            var retrySpinner = document.getElementById('retry-spinner');
            var feedbackBtn = document.getElementById('feedback-btn');

            function setRetryLoading(loading) {
                if (!retryBtn || !retryText || !retrySpinner) return;
                retryBtn.disabled = loading;
                if (loading) {
                    retryText.classList.add('opacity-0');
                    retrySpinner.classList.remove('opacity-0');
                    retrySpinner.classList.add('opacity-100');
                } else {
                    retrySpinner.classList.remove('opacity-100');
                    retrySpinner.classList.add('opacity-0');
                    retryText.classList.remove('opacity-0');
                }
            }

            window.pmErrorPageSetRetryLoading = setRetryLoading;

            if (retryBtn) {
                retryBtn.addEventListener('click', function () {
                    if (window.AndroidErrorPageHost && typeof AndroidErrorPageHost.retry === 'function') {
                        setRetryLoading(true);
                        try {
                            AndroidErrorPageHost.retry();
                        } catch (e) {
                            setRetryLoading(false);
                        }
                    }
                });
            }

            if (feedbackBtn) {
                feedbackBtn.addEventListener('click', function () {
                    if (window.AndroidErrorPageHost && typeof AndroidErrorPageHost.openFeedback === 'function') {
                        try {
                            AndroidErrorPageHost.openFeedback();
                        } catch (e) {}
                    }
                });
            }
        });
    </script>
</body>
</html>
