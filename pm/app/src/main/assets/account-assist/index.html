<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>PisaMusic Account Assist</title>
  <script src="../shared/tailwind.js"></script>
  <script src="../shared/tailwind-base.js"></script>
  <script defer src="file:///android_asset/shared/message.global.js"></script>
  <style>
    :root {
      --native-status-bar-height: 0px;
      --native-navigation-bar-height: 0px;
    }

    html, body {
      overscroll-behavior: none;
      -webkit-overflow-scrolling: auto;
    }

    body {
      height: 100dvh;
      overflow: hidden;
      overflow-x: hidden;
      padding-top: calc(var(--native-status-bar-height) + 6px) !important;
      padding-bottom: calc(var(--native-navigation-bar-height) + 10px) !important;
    }

    .assist-shell {
      height: calc(100dvh - var(--native-status-bar-height) - var(--native-navigation-bar-height) - 16px);
      min-height: 0;
      overflow-y: auto;
      scrollbar-width: none;
    }

    .assist-shell::-webkit-scrollbar {
      display: none;
    }

    .back-button {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, .62);
      background: rgba(255, 255, 255, .58);
      color: rgb(51 65 85);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 14px 32px rgba(15, 23, 42, .08);
      -webkit-backdrop-filter: blur(18px);
      backdrop-filter: blur(18px);
      transition: all 0.2s ease;
    }

    .back-button:active {
      transform: scale(0.92);
    }

    .card {
      border: 1px solid rgba(148, 163, 184, .2);
      background: rgba(255, 255, 255, .74);
      border-radius: 28px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, .08);
      -webkit-backdrop-filter: blur(18px);
      backdrop-filter: blur(18px);
    }

    .field {
      width: 100%;
      border: 1px solid rgba(148, 163, 184, .28);
      border-radius: 18px;
      padding: 14px 16px;
      background: rgba(255, 255, 255, .76);
      outline: none;
      color: rgb(15 23 42);
      transition: all 0.2s ease;
    }

    .field:focus {
      border-color: rgb(56 189 248);
      box-shadow: 0 0 0 4px rgba(56, 189, 248, .16);
      background: #ffffff;
    }

    .primary {
      border-radius: 18px;
      padding: 14px 18px;
      background: rgb(14 165 233);
      color: white;
      font-weight: 700;
      box-shadow: 0 12px 30px rgba(14, 165, 233, .26);
      transition: all 0.2s ease;
    }

    .primary:active:not(:disabled) {
      transform: scale(0.97);
    }

    .ghost {
      border-radius: 18px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, .72);
      color: rgb(51 65 85);
      font-weight: 650;
      transition: all 0.2s ease;
    }

    .icon-badge {
      width: 62px;
      height: 62px;
      border-radius: 22px;
      background: rgb(56 189 248);
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 16px 34px rgba(14, 165, 233, .24);
    }

    @media (prefers-color-scheme: dark) {
      .back-button {
        border-color: rgba(148, 163, 184, .24);
        background: rgba(15, 23, 42, .58);
        color: rgb(226 232 240);
        box-shadow: 0 14px 32px rgba(0, 0, 0, .24);
      }

      .card {
        border-color: rgba(71, 85, 105, .42);
        background: rgba(15, 23, 42, .68);
        box-shadow: 0 24px 60px rgba(0, 0, 0, .24);
      }

      .field {
        background: rgba(15, 23, 42, .72);
        color: white;
        border-color: rgba(71, 85, 105, .7);
      }

      .field:focus {
        background: rgba(30, 41, 59, 1);
      }

      .ghost {
        background: rgba(30, 41, 59, .72);
        color: rgb(226 232 240);
      }
    }
  </style>
</head>
<body class="bg-gradient-to-b from-sky-50 via-white to-white dark:from-slate-900 dark:via-slate-950 dark:to-slate-950 text-slate-900 dark:text-white">
<main class="assist-shell flex flex-col px-6">
  <header class="flex items-center justify-between">
    <button class="back-button" type="button" aria-label="返回" onclick="host.close()">
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 18l-6-6 6-6" />
      </svg>
    </button>
    <div class="text-sm font-medium text-slate-400">PisaMusic</div>
  </header>

  <section class="flex-1 flex flex-col justify-center py-4">
    <div class="card p-5">
      <div class="flex items-center gap-4">
        <div class="icon-badge">
          <svg id="modeIcon" class="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M19 8v6" />
            <path d="M22 11h-6" />
          </svg>
        </div>
        <div class="min-w-0">
          <h1 id="title" class="m-0 text-[28px] leading-tight font-extrabold tracking-normal text-slate-900 dark:text-white">注册账号</h1>
          <p id="subtitle" class="mt-2 text-sm leading-relaxed text-slate-500 dark:text-slate-400">创建 PisaMusic 账号</p>
        </div>
      </div>

      <form id="form" class="mt-6 space-y-3" onsubmit="submitForm(event)">
        <input id="email" class="field" autocomplete="email" placeholder="邮箱" inputmode="email" />
        <input id="username" class="field" autocomplete="username" placeholder="用户名" />
        <input id="password" class="field" autocomplete="new-password" placeholder="密码" type="password" />

        <div class="grid grid-cols-[1fr_auto] gap-2">
          <input id="code" class="field" placeholder="邮箱验证码" inputmode="numeric" />
          <button id="sendCodeBtn" class="ghost whitespace-nowrap min-w-[90px]" type="button" onclick="sendCode()">发送</button>
        </div>

        <button id="submitBtn" class="primary w-full mt-3" type="submit">注册并登录</button>
      </form>
    </div>
  </section>
</main>

<script>
  const host = window.AndroidAccountAssist || {
    close(){},
    getMode(){ return 'register'; },
    sendEmailCode(){},
    registerAccount(){},
    resetPassword(){}
  };
  const mode = host.getMode && host.getMode() === 'reset' ? 'reset' : 'register';
  let countdownInterval = null;
  const $ = (id) => document.getElementById(id);

  function applyMode() {
    const isReset = mode === 'reset';
    $('title').textContent = isReset ? '找回密码' : '注册账号';
    $('subtitle').textContent = isReset ? '验证邮箱后设置新密码' : '创建 PisaMusic 账号';
    $('username').classList.toggle('hidden', isReset);
    $('password').placeholder = isReset ? '新密码' : '密码';
    $('submitBtn').textContent = submitText();
    if (isReset) {
      $('modeIcon').innerHTML = '<path d="M2 12a10 10 0 1 0 4-8" /><path d="M2 4v6h6" /><path d="M12 8v5l3 2" />';
    }
  }

  function submitText() {
    return mode === 'reset' ? '重置密码' : '注册并登录';
  }

  function payload() {
    return {
      email: $('email').value.trim(),
      username: $('username').value.trim(),
      password: $('password').value,
      code: $('code').value.trim(),
    };
  }

  function sendCode() {
    const data = payload();
    if (!data.email) {
      showMessage('请先输入邮箱地址', 'warning');
      return;
    }

    const btn = $('sendCodeBtn');
    host.sendEmailCode(JSON.stringify({ email: data.email }));

    let timeLeft = 60;
    btn.disabled = true;
    btn.classList.add('opacity-50', 'cursor-not-allowed');
    btn.textContent = `${timeLeft}s`;

    clearInterval(countdownInterval);
    countdownInterval = setInterval(() => {
      timeLeft--;
      if (timeLeft <= 0) {
        clearInterval(countdownInterval);
        btn.disabled = false;
        btn.classList.remove('opacity-50', 'cursor-not-allowed');
        btn.textContent = '重新发送';
      } else {
        btn.textContent = `${timeLeft}s`;
      }
    }, 1000);
  }

  function submitForm(event) {
    event.preventDefault();
    const data = payload();
    if (!validateForm(data)) return;
    setSubmitLoading(true);
    if (mode === 'reset') host.resetPassword(JSON.stringify(data));
    else host.registerAccount(JSON.stringify(data));
  }

  function validateForm(data) {
    if (!data.email) {
      showMessage('请先输入邮箱地址', 'warning');
      return false;
    }
    if (mode === 'register' && !data.username) {
      showMessage('请输入用户名', 'warning');
      return false;
    }
    if (!data.password) {
      showMessage(mode === 'reset' ? '请输入新密码' : '请输入密码', 'warning');
      return false;
    }
    if (!data.code) {
      showMessage('请输入邮箱验证码', 'warning');
      return false;
    }
    return true;
  }

  function setSubmitLoading(loading) {
    const btn = $('submitBtn');
    btn.disabled = loading;
    btn.classList.toggle('opacity-60', loading);
    btn.classList.toggle('cursor-not-allowed', loading);
    btn.textContent = loading ? '处理中...' : submitText();
  }

  function showMessage(text, type = 'info') {
    const msg = text || '';
    if (!msg) return;
    if (window.message && typeof window.message[type] === 'function') {
      window.message[type](msg);
      return;
    }
    if (window.message && typeof window.message.info === 'function') {
      window.message.info(msg);
      return;
    }
    console.log(msg);
  }

  window.assistPage = {
    success(text) {
      setSubmitLoading(false);
      showMessage(text || '操作成功', 'success');
    },
    error(text) {
      setSubmitLoading(false);
      showMessage(text || '操作失败', 'error');
    },
    registered() {
      setSubmitLoading(false);
      showMessage('注册成功', 'success');
      setTimeout(() => host.close(), 300);
    },
    resetDone() {
      setSubmitLoading(false);
      showMessage('密码已重置，请使用新密码登录', 'success');
      setTimeout(() => host.close(), 600);
    }
  };

  applyMode();
</script>
</body>
</html>
