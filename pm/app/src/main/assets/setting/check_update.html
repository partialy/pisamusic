<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>检查更新 - pisamusic</title>
    <script src="file:///android_asset/shared/tailwind.js"></script>
    <script src="file:///android_asset/shared/tailwind-base.js"></script>
    <script defer src="file:///android_asset/shared/message.global.js"></script>
    <script>
        (function() {
            try {
                const p = new URLSearchParams(location.search);
                if (p.get('theme') === 'dark') {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            } catch (_) {}
        })();
        tailwind.config.darkMode = 'class';
        Object.assign(tailwind.config.theme.extend, {
            colors: {
                sky: {
                    400: '#38bdf8',
                    500: '#0ea5e9',
                    600: '#0284c7'
                }
            }
        });
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-slate-950 antialiased text-slate-800 dark:text-slate-200">
<div class="relative min-h-screen max-w-md mx-auto bg-[#fefefe] dark:bg-[#17191d] overflow-hidden flex flex-col">
    <main class="flex-1 flex flex-col items-center pt-12 px-6 overflow-y-auto no-scrollbar">
        <div class="w-28 h-28 bg-sky-400 rounded-[2.25rem] flex items-center justify-center shadow-xl shadow-sky-400/30 mb-6 relative">
            <svg class="w-14 h-14 text-white rotate-12 relative z-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 18V5l12-2v13" />
                <circle cx="6" cy="18" r="3" fill="currentColor" />
                <circle cx="18" cy="16" r="3" fill="currentColor" />
            </svg>
            <div id="updateDot" class="absolute top-0 right-0 -mt-1 -mr-1 w-4 h-4 bg-red-500 border-2 border-white dark:border-slate-900 rounded-full hidden"></div>
        </div>

        <h2 class="text-2xl font-bold tracking-tight text-slate-800 dark:text-white mb-1">
            pisa<span class="text-sky-400">music</span>
        </h2>
        <div class="inline-flex items-center justify-center px-3 py-1 mt-1 mb-3 bg-gray-100 dark:bg-slate-800 rounded-full">
            <span id="versionText" class="text-xs font-semibold tracking-wider text-slate-500 dark:text-slate-400">v--</span>
        </div>
        <p id="statusText" class="text-xs text-slate-400 mb-8">正在获取更新信息...</p>

        <div class="w-full bg-sky-50 dark:bg-sky-500/10 rounded-2xl p-5 mb-8 border border-sky-100 dark:border-sky-500/20">
            <h3 class="text-sm font-bold text-sky-700 dark:text-sky-400 mb-2 flex items-center">
                <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                更新内容
            </h3>
            <p id="contentText" class="text-xs text-slate-600 dark:text-slate-300 leading-relaxed">-</p>
            <p id="timeText" class="text-[11px] text-slate-400 mt-3">更新时间：-</p>
        </div>

        <div class="flex-1"></div>
        <div class="w-full pb-10">
            <button id="checkUpdateBtn" class="relative w-full py-3.5 rounded-2xl bg-sky-500 text-white font-semibold text-[15px] shadow-lg shadow-sky-500/30 hover:bg-sky-600 transition-all active:scale-95">
                检查中...
            </button>
            <p class="text-[11px] text-center text-slate-400 mt-4">当前版本：<span id="localVersionText">-</span></p>
        </div>
    </main>

    <div id="sheetBackdrop" class="absolute inset-0 bg-slate-900/40 dark:bg-black/60 backdrop-blur-sm z-40 opacity-0 pointer-events-none transition-opacity duration-300"></div>
    <div id="updateSheet" class="absolute bottom-0 inset-x-0 bg-white dark:bg-slate-900 rounded-t-[2rem] z-50 transform translate-y-full transition-transform duration-300 ease-out shadow-[0_-10px_40px_rgba(0,0,0,0.1)]">
        <div id="closeSheetHandle" class="w-full flex justify-center pt-4 pb-2 cursor-pointer">
            <div class="w-12 h-1.5 bg-gray-300 dark:bg-gray-700 rounded-full"></div>
        </div>
        <div class="px-6 pb-8 pt-2">
            <div class="flex flex-col items-center text-center">
                <div class="w-16 h-16 bg-sky-100 dark:bg-sky-500/20 rounded-full flex items-center justify-center mb-4 relative">
                    <svg class="w-8 h-8 text-sky-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                    </svg>
                    <span class="absolute top-0 right-0 text-amber-400 text-lg">✨</span>
                </div>
                <h3 id="sheetTitle" class="text-xl font-bold text-slate-800 dark:text-white mb-2">检查更新</h3>
                <div class="bg-slate-50 dark:bg-slate-800/50 rounded-xl p-4 mb-6 w-full text-left max-h-48 overflow-y-auto no-scrollbar">
                    <p id="sheetContent" class="text-slate-500 dark:text-slate-400 text-[13px] leading-relaxed whitespace-pre-line">-</p>
                </div>
                <div class="w-full flex flex-col space-y-3">
                    <button id="downloadBtn" class="w-full py-3.5 rounded-2xl bg-sky-500 text-white font-semibold text-[15px] shadow-lg shadow-sky-500/30 hover:bg-sky-600 transition-all active:scale-95">立即下载</button>
                    <button id="officialBtn" class="w-full py-3.5 rounded-2xl bg-transparent text-slate-500 dark:text-slate-400 font-medium hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">访问官网</button>
                    <button id="cancelBtn" class="w-full py-3.5 rounded-2xl bg-transparent text-slate-500 dark:text-slate-400 font-medium hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">稍后再说</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        const state = {
            latestVersion: '',
            updateTime: '',
            updateContent: '',
            downloadUrl: '',
            officialUrl: '',
            localVersion: '',
            hasNewVersion: false,
            downloading: false
        };

        const els = {
            versionText: document.getElementById('versionText'),
            statusText: document.getElementById('statusText'),
            contentText: document.getElementById('contentText'),
            timeText: document.getElementById('timeText'),
            localVersionText: document.getElementById('localVersionText'),
            checkUpdateBtn: document.getElementById('checkUpdateBtn'),
            updateDot: document.getElementById('updateDot'),
            sheetBackdrop: document.getElementById('sheetBackdrop'),
            updateSheet: document.getElementById('updateSheet'),
            closeSheetHandle: document.getElementById('closeSheetHandle'),
            cancelBtn: document.getElementById('cancelBtn'),
            downloadBtn: document.getElementById('downloadBtn'),
            officialBtn: document.getElementById('officialBtn'),
            sheetTitle: document.getElementById('sheetTitle'),
            sheetContent: document.getElementById('sheetContent')
        };

        function openSheet() {
            els.sheetBackdrop.classList.remove('opacity-0', 'pointer-events-none');
            els.sheetBackdrop.classList.add('opacity-100');
            els.updateSheet.classList.remove('translate-y-full');
            els.updateSheet.classList.add('translate-y-0');
        }

        function closeSheet() {
            els.sheetBackdrop.classList.remove('opacity-100');
            els.sheetBackdrop.classList.add('opacity-0', 'pointer-events-none');
            els.updateSheet.classList.remove('translate-y-0');
            els.updateSheet.classList.add('translate-y-full');
        }

        function bindEvents() {
            els.checkUpdateBtn.addEventListener('click', function() {
                if (state.hasNewVersion) {
                    openSheet();
                    return;
                }
                if (window.AndroidUpdateHost && typeof window.AndroidUpdateHost.recheckUpdate === 'function') {
                    window.AndroidUpdateHost.recheckUpdate();
                }
            });
            els.sheetBackdrop.addEventListener('click', closeSheet);
            els.closeSheetHandle.addEventListener('click', closeSheet);
            els.cancelBtn.addEventListener('click', closeSheet);
            els.downloadBtn.addEventListener('click', function() {
                if (window.AndroidUpdateHost && state.downloadUrl) {
                    window.AndroidUpdateHost.startDownload(state.downloadUrl);
                }
            });
            els.officialBtn.addEventListener('click', function() {
                if (window.AndroidUpdateHost && state.officialUrl) {
                    window.AndroidUpdateHost.openOfficial(state.officialUrl);
                }
            });
        }

        window.PM_CHECK_UPDATE = {
            render: function(data) {
                state.latestVersion = data.latestVersion || '';
                state.updateTime = data.updateTime || '';
                state.updateContent = data.updateContent || '';
                state.downloadUrl = data.downloadUrl || '';
                state.officialUrl = data.officialUrl || '';
                state.localVersion = data.localVersion || '';
                state.hasNewVersion = !!data.hasNewVersion;

                els.localVersionText.textContent = state.localVersion || '-';
                els.versionText.textContent = state.latestVersion || 'v--';
                els.contentText.textContent = state.updateContent || '暂无更新说明';
                els.timeText.textContent = '更新时间：' + (state.updateTime || '-');
                els.sheetTitle.textContent = state.latestVersion ? ('发现新版本 ' + state.latestVersion) : '检查更新';
                els.sheetContent.textContent = state.updateContent || '暂无更新说明';

                const hasData = !!data.hasData;
                if (hasData) {
                    els.statusText.textContent = '已获取最新更新信息';
                    els.checkUpdateBtn.disabled = false;
                    if (state.hasNewVersion) {
                        els.updateDot.classList.remove('hidden');
                        els.checkUpdateBtn.textContent = '查看更新详情';
                    } else {
                        els.updateDot.classList.add('hidden');
                        els.checkUpdateBtn.textContent = '已经是最新版本';
                    }
                } else {
                    els.statusText.textContent = '暂时无法获取更新信息';
                    els.updateDot.classList.add('hidden');
                    els.checkUpdateBtn.disabled = true;
                    els.checkUpdateBtn.textContent = '检查失败';
                }
            },
            setError: function(message) {
                els.statusText.textContent = message || '更新信息获取失败';
                els.checkUpdateBtn.disabled = true;
                els.checkUpdateBtn.textContent = '检查失败';
            },
            onDownloadProgress: function(payload) {
                if (!payload) return;
                state.downloading = !!payload.downloading;
                const progress = typeof payload.progress === 'number' ? payload.progress : -1;
                const text = payload.text || '';
                if (state.downloading) {
                    els.downloadBtn.disabled = true;
                    els.officialBtn.disabled = true;
                    els.cancelBtn.disabled = true;
                    if (progress >= 0) {
                        els.downloadBtn.textContent = '下载中 ' + progress + '%';
                    } else {
                        els.downloadBtn.textContent = text || '下载中...';
                    }
                } else {
                    els.downloadBtn.disabled = false;
                    els.officialBtn.disabled = false;
                    els.cancelBtn.disabled = false;
                    els.downloadBtn.textContent = '立即下载';
                    if (text) {
                        message.info(text);
                    }
                }
            },
            onCheckResult: function(result) {
                const msg = (result && result.message) || '';
                if (result && result.checked) {
                    if (result.hasNewVersion) {
                        if (result.fromAuto) {
                            openSheet();
                        } else {
                            message.success(msg || '发现新版本');
                            openSheet();
                        }
                    } else if (!result.fromAuto) {
                        message.info(msg || '已经是最新版本');
                    }
                    return;
                }
                if (!result || result.fromAuto) return;
                if (result.cooldownMs && result.cooldownMs > 0) {
                    const sec = Math.ceil(result.cooldownMs / 1000);
                    message.warning('请勿频繁点击，请在 ' + sec + 's 后重试');
                } else {
                    message.error(msg || '检查失败');
                }
            }
        };

        bindEvents();
    })();
</script>
</body>
</html>
