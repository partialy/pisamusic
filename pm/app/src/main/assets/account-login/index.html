<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>PisaMusic Account</title>
  <script src="../shared/tailwind.js"></script>
  <script src="../shared/tailwind-base.js"></script>
  <script defer src="file:///android_asset/shared/message.global.js"></script>
  <style>
    :root {
      --native-status-bar-height: env(safe-area-inset-top);
      --native-navigation-bar-height: env(safe-area-inset-bottom);
    }

    /* 移除了强行的 transition: none，让 UI 活起来 */
    html, body {
      overscroll-behavior: none;
      -webkit-overflow-scrolling: auto;
    }

    body {
      height: 100dvh;
      overflow: hidden;
      overflow-x: hidden;
      padding-top: max(14px, var(--native-status-bar-height)) !important;
      padding-bottom: max(10px, var(--native-navigation-bar-height)) !important;
    }

    .login-shell {
      height: calc(100dvh - max(14px, var(--native-status-bar-height)) - max(10px, var(--native-navigation-bar-height)));
      min-height: 0;
      overflow-y: auto;
      scrollbar-width: none;
    }

    .login-shell::-webkit-scrollbar {
      display: none;
    }

    .back-button {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, .62);
      background: rgba(255, 255, 255, .58);
      color: rgb(51 65 85);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 14px 32px rgba(15, 23, 42, .08);
      -webkit-backdrop-filter: blur(18px);
      backdrop-filter: blur(18px);
      transition: all 0.2s ease;
    }

    .back-button:active {
      transform: scale(0.92);
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .app-logo {
      width: 66px;
      height: 66px;
      border-radius: 24px;
      background: rgb(56 189 248);
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      box-shadow: 0 16px 34px rgba(14, 165, 233, .24);
    }

    .brand-copy {
      min-width: 0;
    }

    .brand-copy h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.08;
      font-weight: 800;
      letter-spacing: 0;
      color: rgb(15 23 42);
    }

    .brand-copy p {
      margin: 7px 0 0;
      font-size: 14px;
      line-height: 1.45;
      color: rgb(100 116 139);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .field {
      width: 100%;
      border: 1px solid rgba(148, 163, 184, .28);
      border-radius: 18px;
      padding: 14px 16px;
      background: rgba(255, 255, 255, .76);
      outline: none;
      color: rgb(15 23 42);
      transition: all 0.2s ease;
    }

    .field:focus {
      border-color: rgb(56 189 248);
      box-shadow: 0 0 0 4px rgba(56, 189, 248, .16);
      background: #ffffff;
    }

    .primary {
      border-radius: 18px;
      padding: 14px 18px;
      background: rgb(14 165 233);
      color: white;
      font-weight: 700;
      box-shadow: 0 12px 30px rgba(14, 165, 233, .26);
      transition: all 0.2s ease;
    }

    .primary:active:not(:disabled) {
      transform: scale(0.97);
    }

    .ghost {
      border-radius: 18px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, .72);
      color: rgb(51 65 85);
      font-weight: 650;
      transition: all 0.2s ease;
    }

    @media (max-width: 360px) {
      .app-logo {
        width: 58px;
        height: 58px;
        border-radius: 21px;
      }

      .brand-copy h1 {
        font-size: 26px;
      }

      .brand-copy p {
        font-size: 13px;
      }
    }

    @media (prefers-color-scheme: dark) {
      .back-button {
        border-color: rgba(148, 163, 184, .24);
        background: rgba(15, 23, 42, .58);
        color: rgb(226 232 240);
        box-shadow: 0 14px 32px rgba(0, 0, 0, .24);
      }

      .brand-copy h1 {
        color: white;
      }

      .brand-copy p {
        color: rgb(148 163 184);
      }

      .field {
        background: rgba(15, 23, 42, .72);
        color: white;
        border-color: rgba(71, 85, 105, .7);
      }

      .field:focus {
        background: rgba(30, 41, 59, 1);
      }

      .ghost {
        background: rgba(30, 41, 59, .72);
        color: rgb(226 232 240);
      }
    }
  </style>
</head>
<body class="bg-gradient-to-b from-sky-50 via-white to-white dark:from-slate-900 dark:via-slate-950 dark:to-slate-950 text-slate-900 dark:text-white pt-[max(14px,env(safe-area-inset-top))] pb-[max(10px,env(safe-area-inset-bottom))]">
<main class="login-shell flex flex-col px-6">
  <header class="flex items-center justify-between">
    <button class="back-button" type="button" aria-label="返回" onclick="host.close()">
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 18l-6-6 6-6" />
      </svg>
    </button>
    <div class="text-sm font-medium text-slate-400">PisaMusic</div>
  </header>

  <section class="flex-1 flex flex-col justify-center py-4">
    <div class="brand-row">
      <div class="app-logo">
        <svg class="w-9 h-9 rotate-12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 18V5l12-2v13" />
          <circle cx="6" cy="18" r="3" fill="currentColor" />
          <circle cx="18" cy="16" r="3" fill="currentColor" />
        </svg>
      </div>
      <div class="brand-copy">
        <h1>登录账号</h1>
        <p>收藏、歌单与桌面端自动同步</p>
      </div>
    </div>

    <div class="grid grid-cols-4 gap-2 mt-6 p-1.5 rounded-[22px] bg-slate-100/80 dark:bg-slate-800/70 shadow-inner">
      <button id="tabPassword" class="primary !py-3 !shadow-none" onclick="setMode('password')">密码</button>
      <button id="tabCode" class="ghost !py-3" onclick="setMode('code')">验证码</button>
      <button id="tabRegister" class="ghost !py-3" onclick="setMode('register')">注册</button>
      <button id="tabReset" class="ghost !py-3" onclick="setMode('reset')">找回</button>
    </div>

    <form id="form" class="mt-5 space-y-3" onsubmit="submitForm(event)">
      <input id="identifier" class="field" autocomplete="username" placeholder="用户名或邮箱" />
      <input id="email" class="field hidden" autocomplete="email" placeholder="邮箱" inputmode="email" />
      <input id="username" class="field hidden" autocomplete="username" placeholder="用户名" />
      <input id="password" class="field" autocomplete="current-password" placeholder="密码" type="password" />

      <div id="codeRow" class="hidden grid grid-cols-[1fr_auto] gap-2">
        <input id="code" class="field" placeholder="邮箱验证码" inputmode="numeric" />
        <button id="sendCodeBtn" class="ghost whitespace-nowrap min-w-[90px]" type="button" onclick="sendCode()">发送</button>
      </div>

      <button id="submitBtn" class="primary w-full mt-3" type="submit">登录</button>
    </form>
  </section>
</main>

<script>
  let mode = 'password';
  let countdownInterval = null; // 用于存储倒计时的定时器

  const host = window.AndroidAccount || { close(){}, sendEmailCode(){}, loginByPassword(){}, loginByCode(){}, registerAccount(){}, resetPassword(){} };
  const $ = (id) => document.getElementById(id);

  function setMode(next) {
    mode = next;
    ['Password','Code','Register','Reset'].forEach((name) => {
      const active = name.toLowerCase() === next;
      $('tab' + name).className = active ? 'primary !py-3 !shadow-none' : 'ghost !py-3 hover:bg-white/90 dark:hover:bg-slate-800';
    });
    $('identifier').classList.toggle('hidden', next !== 'password');
    $('email').classList.toggle('hidden', next === 'password');
    $('username').classList.toggle('hidden', next !== 'register');
    $('password').classList.toggle('hidden', next === 'code');
    $('codeRow').classList.toggle('hidden', next === 'password');
    $('password').placeholder = next === 'reset' ? '新密码' : '密码';
    $('password').autocomplete = next === 'reset' || next === 'register' ? 'new-password' : 'current-password';

    $('submitBtn').textContent = submitText();
  }

  function submitText() {
    if (mode === 'register') return '注册并登录';
    if (mode === 'reset') return '重置密码';
    return '登录';
  }

  function payload() {
    return {
      identifier: $('identifier').value.trim(),
      email: $('email').value.trim(),
      username: $('username').value.trim(),
      password: $('password').value,
      code: $('code').value.trim(),
    };
  }

  function sendCode() {
    const data = payload();

    // 发送前先校验邮箱是否为空
    if (!data.email) {
      showMessage('请先输入邮箱地址', 'warning');
      return;
    }

    const btn = $('sendCodeBtn');

    // 触发底层接口
    const purpose = mode === 'register' ? 'register' : (mode === 'reset' ? 'reset_password' : 'login');
    host.sendEmailCode(JSON.stringify({ email: data.email, purpose }));

    // 开启 60s 倒计时
    let timeLeft = 60;
    btn.disabled = true;
    btn.classList.add('opacity-50', 'cursor-not-allowed');
    btn.textContent = `${timeLeft}s`;

    clearInterval(countdownInterval); // 清除可能存在的旧定时器

    countdownInterval = setInterval(() => {
      timeLeft--;
      if (timeLeft <= 0) {
        clearInterval(countdownInterval);
        btn.disabled = false;
        btn.classList.remove('opacity-50', 'cursor-not-allowed');
        btn.textContent = '重新发送';
      } else {
        btn.textContent = `${timeLeft}s`;
      }
    }, 1000);
  }

  function submitForm(event) {
    event.preventDefault();
    const data = payload();
    if (!validateForm(data)) return;
    setSubmitLoading(true);
    if (mode === 'password') host.loginByPassword(JSON.stringify(data));
    else if (mode === 'code') host.loginByCode(JSON.stringify(data));
    else if (mode === 'register') host.registerAccount(JSON.stringify(data));
    else host.resetPassword(JSON.stringify(data));
  }

  function validateForm(data) {
    if (mode === 'password' && (!data.identifier || !data.password)) {
      showMessage('请输入账号和密码', 'warning');
      return false;
    }
    if ((mode === 'code' || mode === 'register' || mode === 'reset') && !data.email) {
      showMessage('请先输入邮箱地址', 'warning');
      return false;
    }
    if (mode === 'register' && !data.username) {
      showMessage('请输入用户名', 'warning');
      return false;
    }
    if ((mode === 'register' || mode === 'reset') && !data.password) {
      showMessage(mode === 'reset' ? '请输入新密码' : '请输入密码', 'warning');
      return false;
    }
    if ((mode === 'code' || mode === 'register' || mode === 'reset') && !data.code) {
      showMessage('请输入邮箱验证码', 'warning');
      return false;
    }
    return true;
  }

  // 将 loading 状态限制在提交按钮上，防止干扰倒计时按钮
  function setSubmitLoading(loading) {
    const btn = $('submitBtn');
    btn.disabled = loading;
    btn.classList.toggle('opacity-60', loading);
    btn.classList.toggle('cursor-not-allowed', loading);
    if (loading) {
      btn.textContent = '处理中...';
    } else {
      btn.textContent = submitText();
    }
  }

  function showMessage(text, type = 'info') {
    const msg = text || '';
    if (!msg) return;
    if (window.message && typeof window.message[type] === 'function') {
      window.message[type](msg);
      return;
    }
    if (window.message && typeof window.message.info === 'function') {
      window.message.info(msg);
      return;
    }
    console.log(msg);
  }

  // 暴露给 Native 调用的回调
  window.accountPage = {
    success(text) {
      setSubmitLoading(false);
      showMessage(text || '操作成功', 'success');
    },
    error(text) {
      setSubmitLoading(false);
      showMessage(text || '操作失败', 'error');
    },
    loggedIn() {
      setSubmitLoading(false);
      showMessage('登录成功', 'success');
      host.close();
    },
    passwordReset(email) {
      setSubmitLoading(false);
      showMessage('密码已重置，请使用新密码登录', 'success');
      setMode('password');
      $('identifier').value = email || $('email').value.trim();
      $('password').value = '';
      $('code').value = '';
    }
  };
</script>
</body>
</html>
