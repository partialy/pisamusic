    <style>
      /* 新增：锁定状态下穿透 + 隐藏控制器 */
      body.locked #container {
        pointer-events: none; /* 穿透点击 */
      }

      body.locked #controller {
        display: none !important;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: transparent !important;
        overflow: hidden;
        height: 100%;
      }

      #container {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        cursor: default;
      }

      #controller {
        position: absolute;
        top: 10%;
        left: 50%;
        transform: translateX(-50%);
        z-index: 2;
        color: white;
        width: auto;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: row;
        display: none;
        gap: 10px;
        cursor: default;
        .btn {
          display: flex;
          align-items: center;
          justify-content: center;
          width: 24px;
          height: 24px;
          cursor: pointer;
          color: white;
          border-radius: 8px;
          &:hover {
            background: rgba(255, 255, 255, 0.2);
          }
        }
      }

      #container.is-hover {
        background: rgba(50, 50, 50, 0.3);
        cursor: move;
        #controller {
          display: flex;
        }
      }

      #lyric-wrapper {
        position: relative;
        max-width: 1200px;
        overflow: hidden;
        white-space: nowrap;
        text-align: center;
      }

      #lyric-text {
        display: inline-block;
        color: transparent;
        background-clip: text;
        -webkit-background-clip: text;
        line-height: 1.2;
        user-select: none;
        pointer-events: none;
      }
    </style>
  </head>

    <script>
      // ======================
      // 默认样式配置
      // ======================
      let styleConfig = {
        maxSize: 64,
        minSize: 10,
        fontSize: 28,
        fontFamily: '"Microsoft YaHei", "PingFang SC", sans-serif',
        textColor: "#fff",
        highlightColor: "#1871FD",
        fontWeight: 600,
      };

      // ======================
      // 状态
      // ======================
      let lyrics = [
        {
          startTime: 0,
          words: [{ word: "暂时没有歌词哦~", startTime: 0, endTime: 3000 }],
          endTime: 100000,
        },
      ];

      // 播放状态
      let isPlaying = false;
      let baseTime = 0; // 最近一次接收到的播放时间（ms）
      let baseReceivedAt = 0; // 接收该时间时的 performance.now()
      let rafId = null; // requestAnimationFrame ID

      const container = document.getElementById("container");
      const lyricTextEl = document.getElementById("lyric-text");
      const wrapperEl = document.getElementById("lyric-wrapper");

      // ======================
      // 应用当前样式到 DOM
      // ======================
      function applyStyle() {
        lyricTextEl.style.fontSize = styleConfig.fontSize + "px";
        lyricTextEl.style.fontFamily = styleConfig.fontFamily;
        lyricTextEl.style.fontWeight = styleConfig.fontWeight;
      }

      // ======================
      // 工具函数：测量文本宽度
      // ======================
      function getTextWidth(text) {
        if (!text) return 0;
        const span = document.createElement("span");
        span.textContent = text;
        span.style.fontSize = styleConfig.fontSize + "px";
        span.style.fontFamily = styleConfig.fontFamily;
        span.style.position = "absolute";
        span.style.top = "-9999px";
        span.style.left = "-9999px";
        span.style.visibility = "hidden";
        document.body.appendChild(span);
        const width = span.offsetWidth;
        document.body.removeChild(span);
        return width;
      }

      // ======================
      // 根据时间查找当前应显示的行
      // ======================
      function getCurrentLine(time) {
        if (lyrics.length === 0) return null;
        for (let i = lyrics.length - 1; i >= 0; i--) {
          if (time >= lyrics[i].startTime) {
            return lyrics[i];
          }
        }
        return null;
      }

      // ======================
      // 将一行歌词展开为字符时间序列
      // ======================
      function buildCharTimeline(line) {
        if (!line || !line.words) return [];
        const chars = [];
        for (const word of line.words) {
          const text = word.word;
          const duration = word.endTime - word.startTime;
          const len = text.length;
          for (let i = 0; i < len; i++) {
            const char = text[i];
            const start = word.startTime + (duration / len) * i;
            const end = word.startTime + (duration / len) * (i + 1);
            chars.push({ char, start, end });
          }
        }
        return chars;
      }

      // ======================
      // 渲染指定时间的歌词（核心渲染逻辑）
      // ======================
      function renderWithTime(displayTime) {
        const currentLine = getCurrentLine(displayTime);

        if (!currentLine) {
          lyricTextEl.textContent = "—";
          lyricTextEl.style.backgroundImage = "none";
          wrapperEl.scrollLeft = 0;
          return;
        }

        const chars = buildCharTimeline(currentLine);
        if (chars.length === 0) {
          lyricTextEl.textContent = "—";
          lyricTextEl.style.backgroundImage = "none";
          wrapperEl.scrollLeft = 0;
          return;
        }

        const fullText = chars.map((c) => c.char).join("");
        lyricTextEl.textContent = fullText;

        const totalTextWidth = getTextWidth(fullText);
        let highlightWidthPx = 0;

        let lastFullIndex = -1;
        for (let i = 0; i < chars.length; i++) {
          if (displayTime >= chars[i].end) {
            lastFullIndex = i;
          } else {
            break;
          }
        }

        if (lastFullIndex >= chars.length - 1) {
          highlightWidthPx = totalTextWidth;
        } else if (lastFullIndex >= 0) {
          const fullPart = chars
            .slice(0, lastFullIndex + 1)
            .map((c) => c.char)
            .join("");
          const fullWidth = getTextWidth(fullPart);
          const currentChar = chars[lastFullIndex + 1];
          const prog = Math.max(
            0,
            Math.min(
              1,
              (displayTime - currentChar.start) /
                (currentChar.end - currentChar.start)
            )
          );
          const charWidth = getTextWidth(currentChar.char);
          highlightWidthPx = fullWidth + charWidth * prog;
        } else if (displayTime >= chars[0].start) {
          const firstChar = chars[0];
          const prog = Math.max(
            0,
            Math.min(
              1,
              (displayTime - firstChar.start) /
                (firstChar.end - firstChar.start)
            )
          );
          highlightWidthPx = getTextWidth(firstChar.char) * prog;
        } else {
          highlightWidthPx = 0;
        }

        const progressPercent = Math.min(
          100,
          (highlightWidthPx / totalTextWidth) * 100
        );
        lyricTextEl.style.backgroundImage = `linear-gradient(to right, ${styleConfig.highlightColor} ${progressPercent}%, ${styleConfig.textColor} ${progressPercent}%)`;

        if (totalTextWidth > 1200) {
          const idealScroll = Math.max(0, highlightWidthPx - 600);
          wrapperEl.scrollLeft = idealScroll;
        } else {
          wrapperEl.scrollLeft = 0;
        }
      }

      // ======================
      // 动画循环
      // ======================
      function animate() {
        if (!isPlaying) {
          rafId = null;
          return;
        }

        const now = performance.now();
        const displayTime = baseTime + (now - baseReceivedAt);
        renderWithTime(displayTime);
        rafId = requestAnimationFrame(animate);
      }

      // ======================
      // 对外 API
      // ======================
      function setLyrics(lines) {
        if (!Array.isArray(lines) || lines.length === 0) {
          
          lyrics = [
        {
          startTime: 0,
          words: [{ word: "暂时没有歌词哦~", startTime: 0, endTime: 3000 }],
          endTime: 500000,
        },
      ];
      renderWithTime(baseTime);
        } else {
          lyrics = lines
            .filter((line) => line && Array.isArray(line.words))
            .sort((a, b) => a.startTime - b.startTime);
          // 立即渲染当前状态（用于初始化或非播放状态）
          renderWithTime(baseTime);
        }
      }

      function updateTime(time) {
        baseTime = time;
        baseReceivedAt = performance.now();
        if (isPlaying && rafId === null) {
          rafId = requestAnimationFrame(animate);
        }
        // 即使暂停，也更新一次显示（比如跳转后暂停）
        if (!isPlaying) {
          renderWithTime(baseTime);
        }
      }

      function setStyle(style) {
        if (typeof style === "object" && style !== null) {
          styleConfig.fontSize = style.fontSize ?? styleConfig.fontSize;
          styleConfig.fontFamily = style.fontFamily ?? styleConfig.fontFamily;
          styleConfig.textColor = style.textColor ?? styleConfig.textColor;
          styleConfig.highlightColor =
            style.highlightColor ?? styleConfig.highlightColor;
          styleConfig.fontWeight = style.fontWeight ?? styleConfig.fontWeight;
          styleConfig.minSize = style.minSize ?? styleConfig.minSize;
          styleConfig.maxSize = style.maxSize ?? styleConfig.maxSize;
          applyStyle();
          renderWithTime(baseTime); // 重新渲染
        }
      }

      function changeFontSize(size) {
        styleConfig.fontSize = size;
        applyStyle();
        renderWithTime(baseTime);
      }

      const playBtn = document.getElementById("play-btn");
      const pauseBtn = document.getElementById("pause-btn");
      const prevBtn = document.getElementById("prev-btn");
      const nextBtn = document.getElementById("next-btn");
      const closeBtn = document.getElementById("close-btn");
      function play() {
        isPlaying = true;
        playBtn.style.display = "none";
        pauseBtn.style.display = "flex";
        if (rafId === null) {
          rafId = requestAnimationFrame(animate);
        }
      }

      function pause() {
        isPlaying = false;
        pauseBtn.style.display = "none";
        playBtn.style.display = "flex";
        if (rafId !== null) {
          cancelAnimationFrame(rafId);
          rafId = null;
        }
        // 暂停时定格在当前时间
        renderWithTime(baseTime);
      }

      pause();

      window.lyric = {
        setLyrics,
        updateTime,
        setStyle,
        play,
        pause,
        changeFontSize,
      };

      // ======================
      // 初始化
      // ======================
      applyStyle();
      renderWithTime(baseTime);

      // ======================
      // 交互
      // ======================
      container.addEventListener("mouseover", () => {
        container.classList.add("is-hover");
      });

      container.addEventListener("mouseout", () => {
        container.classList.remove("is-hover");
      });
    </script>

    <!-- 
    ==============================
    [Electron IPC 通信适配器 & 拖拽]
    ==============================
    -->
    <script>
      if (typeof require !== "undefined") {
        console.log("Electron IPC enabled");
        try {
          const { ipcRenderer } = require("electron");

          function setupMediaController() {
            const mediaControl = function (action) {
              ipcRenderer.send("lyric-media-control", action);
            };
            prevBtn.addEventListener("click", () => {
              mediaControl("prev");
            });
            nextBtn.addEventListener("click", () => {
              mediaControl("next");
            });
            playBtn.addEventListener("click", () => {
              mediaControl("play");
            });
            pauseBtn.addEventListener("click", () => {
              mediaControl("pause");
            });
            closeBtn.addEventListener("click", () => {
              console.log("close");
              mediaControl("close");
            });
          }

          // ======================
          // 窗口拖拽逻辑（仿 lyric.html）
          // ======================
          let isDragging = false;
          let startX = 0;
          let startY = 0;
          let startWinX = 0;
          let startWinY = 0;
          let winWidth = 0;
          let winHeight = 0;

          // 只有在非锁定状态才允许拖拽（当前无 lock 状态，先全局启用）
          function setupWindowDragListeners() {
            document.addEventListener("mousedown", startDrag);
            document.addEventListener("mousemove", dragWindow);
            document.addEventListener("mouseup", endDrag);
          }

          async function startDrag(event) {
            // 防止在文本上误触（可选）
            if (event.target.closest("#lyric-text")) return;

            isDragging = true;
            const { screenX, screenY } = event;

            try {
              const bounds = await ipcRenderer.invoke("get-window-bounds");
              const { x, y, width, height } = bounds;
              startX = screenX;
              startY = screenY;
              startWinX = x;
              startWinY = y;
              winWidth = width;
              winHeight = height;
            } catch (err) {
              console.error("Failed to get window bounds for drag:", err);
              isDragging = false;
            }
          }

          async function dragWindow(event) {
            if (!isDragging) return;

            const { screenX, screenY } = event;
            let newWinX = startWinX + (screenX - startX);
            let newWinY = startWinY + (screenY - startY);

            try {
              const screenSize = await ipcRenderer.invoke("get-screen-size");
              const { width: screenWidth, height: screenHeight } = screenSize;

              // 限制窗口不超出屏幕
              newWinX = Math.max(0, Math.min(screenWidth - winWidth, newWinX));
              newWinY = Math.max(
                0,
                Math.min(screenHeight - winHeight, newWinY)
              );

              // 发送移动指令
              if (window.electron?.ipcRenderer?.send) {
                window.electron.ipcRenderer.send(
                  "move-window",
                  newWinX,
                  newWinY,
                  winWidth,
                  winHeight
                );
              } else {
                ipcRenderer.send(
                  "move-window",
                  newWinX,
                  newWinY,
                  winWidth,
                  winHeight
                );
              }
            } catch (err) {
              console.error("Drag error:", err);
            }
          }

          function endDrag() {
            isDragging = false;
          }

          function lockLyric() {
            // 锁定窗口
            ipcRenderer.send("lock-lyric", true);
          }

          // ===== 新增：锁定/解锁窗口 =====
          function setLocked(locked) {
            if (locked) {
              document.body.classList.add("locked");
              // 可选：移除 hover 效果
              container.classList.remove("is-hover");
            } else {
              document.body.classList.remove("locked");
            }
          }

          // 监听主进程发来的锁定指令
          ipcRenderer.on("lock-lyric", (event, locked) => {
            setLocked(locked);
          });

          // 初始化拖拽监听
          setupWindowDragListeners();
          setupMediaController();

          function sizeChange(add) {
            const currentSize = lyricTextEl.style.fontSize.replace("px", "");
            if (add) {
              const newSize = parseInt(currentSize) + 1;
              if (newSize > styleConfig.maxSize) {
                return;
              }
              ipcRenderer.send("change-font-size", newSize);
            } else {
              const newSize = parseInt(currentSize) - 1;
              if (newSize < styleConfig.minSize) {
                return;
              }
              ipcRenderer.send("change-font-size", newSize);
            }
          }

          ipcRenderer.on("change-font-size", (event, size) => {
            window.lyric?.changeFontSize?.(size);
          });

          ipcRenderer.on("set-lyrics", (event, lyrics) => {
            console.log("Received lyrics:", lyrics);
            window.lyric?.setLyrics?.(lyrics);
          });

          ipcRenderer.on("update-time", (event, time) => {
            window.lyric?.updateTime?.(time);
          });

          ipcRenderer.on("set-lyric-style", (event, style) => {
            console.log("Received style:", style);
            window.lyric?.setStyle?.(style);
          });

          ipcRenderer.on("play", () => {
            window.lyric?.play?.();
          });

          ipcRenderer.on("pause", () => {
            window.lyric?.pause?.();
          });

          ipcRenderer.on("window-focus", () => {
            container.classList.add("is-hover");
          });

          ipcRenderer.on("window-blur", () => {
            container.classList.remove("is-hover");
          });

          ipcRenderer.send("lyric-window-ready");
        } catch (e) {
          console.warn("Electron IPC not available:", e);
        }
      }
    </script>
  </body>
</html>
