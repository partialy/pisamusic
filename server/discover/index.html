<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>PisaMusic Discover</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #fefefe;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #0ea5e9;
      --accent-soft: rgba(14, 165, 233, 0.12);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        color-scheme: dark;
        --bg: #17191d;
        --panel: #202329;
        --text: #f8fafc;
        --muted: #94a3b8;
        --line: #2f343d;
        --accent: #38bdf8;
        --accent-soft: rgba(56, 189, 248, 0.16);
      }
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      overscroll-behavior: none;
    }

    body {
      overflow-x: hidden;
    }

    body::-webkit-scrollbar,
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    body,
    .no-scrollbar {
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    main {
      min-height: 100vh;
      padding: 28px 18px 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrap {
      width: min(100%, 520px);
    }

    .hero {
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--panel);
      padding: 28px 24px;
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
    }

    .mark {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      margin-bottom: 22px;
      background: var(--accent-soft);
      color: var(--accent);
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.18;
      letter-spacing: 0;
    }

    p {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.75;
    }

    .grid {
      display: grid;
      gap: 12px;
      margin-top: 22px;
    }

    .item {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px 16px;
      background: var(--accent-soft);
    }

    .item strong {
      display: block;
      margin-bottom: 4px;
      font-size: 15px;
    }

    .item span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }
  </style>
</head>
<body class="no-scrollbar">
  <main>
    <section class="wrap">
      <div class="hero">
        <div class="mark" aria-hidden="true">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18V5l12-2v13" />
            <circle cx="6" cy="18" r="3" />
            <circle cx="18" cy="16" r="3" />
          </svg>
        </div>
        <h1>发现更多</h1>
        <p>这里是 PisaMusic 的发现页占位内容。后续可以在这个页面扩展推荐、活动、歌单专题或其他轻量交互内容。</p>
        <div class="grid">
          <div class="item">
            <strong>内容容器已就绪</strong>
            <span>页面由服务端静态托管，并通过公开发现接口下发完整访问地址。</span>
          </div>
          <div class="item">
            <strong>深色模式自适应</strong>
            <span>样式跟随系统主题，不显示滚动条，并关闭过度滚动回弹。</span>
          </div>
        </div>
      </div>
    </section>
  </main>
  <script>
    (function () {
      var host = window.AndroidDiscoverHost;
      window.PisaDiscover = {
        hasAndroidHost: !!host
      };
    })();
  </script>
</body>
</html>
