<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f7fbff" />
  <title>下载 Pisa Music</title>
  <style>
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: #10233f;
      background: linear-gradient(160deg, #f0f9ff, #fff 58%, #f8fafc);
      font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    main {
      width: min(420px, 100%);
      padding: 38px 28px;
      border: 1px solid #e5eef6;
      border-radius: 28px;
      background: #fff;
      box-shadow: 0 24px 70px rgba(71, 111, 145, .13);
      text-align: center;
    }
    h1 { margin: 0; font-size: 25px; }
    p { margin: 14px 0 24px; color: #64748b; line-height: 1.7; }
    a {
      width: 100%;
      height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(90deg, #0ea5e9, #0284c7);
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>正在准备下载...</h1>
    <p id="status">正在获取最新 Android 版本。</p>
    <a id="fallback" href="/#download">返回官网下载页</a>
  </main>
  <script>
    const status = document.getElementById("status");

    async function startDownload() {
      try {
        const response = await fetch("/api/config/releases", {
          headers: { Accept: "application/json" },
        });
        const body = await response.json();
        const android = body && body.success ? body.data && body.data.android : null;
        if (!response.ok || !android || !android.available || !android.downloadUrl) {
          throw new Error("download unavailable");
        }
        status.innerText = `即将下载 ${android.platformLabel || "Android 版"} ${android.latestVersion || ""}`;
        window.location.replace(android.downloadUrl);
      } catch {
        status.innerText = "暂未获取到可用安装包，请前往官网下载区域查看。";
      }
    }

    startDownload();
  </script>
</body>
</html>
